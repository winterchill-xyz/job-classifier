version: job-taxonomy-v2
description: >
  Software/IT relevance and multi-label disciplines for winterchill jobs.
  Runtime classifiers must choose only from these labels. A job can have
  multiple disciplines and multiple archetypes.

software_relevant:
  principle: >
    Relevant jobs build, operate, secure, test, analyze, automate, integrate, or
    lead software/IT systems. The word "engineer" alone is not enough: physical
    engineering, facilities, field service, wet-lab research, helpdesk, and
    non-engineering management are excluded unless there is explicit software,
    data, cloud, automation, or production-systems ownership.
  include:
    - Software, web, mobile, data, ML/AI, quant/trading systems, platform, infrastructure, cloud, security, QA automation, embedded/robotics software, game, developer-experience, business-systems, developer-relations, and product-engineering roles.
    - Engineering managers and engineering leadership whose teams build software, data, security, infrastructure, or IT systems.
    - Technical solutions/customer/sales/implementation roles when they require building, integrating, scripting, APIs, cloud/data/security implementation, or production technical ownership.
    - Application/platform/developer/trading/cloud support only when coding, automation, debugging, infrastructure, or production-systems ownership is explicit.
  exclude:
    - Civil, structural, mechanical, electrical, MEP, manufacturing, maintenance, facilities, field-service, construction, process, quality, performance/flight-operations, and site engineering with no software/IT focus.
    - Process design engineering in water/wastewater/construction contexts, including process calculations, PFDs/P&IDs, HAZOP/DSEAR, hydraulic calculations, buildability, and safe-construction design work.
    - Low-voltage, control-panel, MCC, utilities, water, power, industrial electrical, and other physical engineering-management roles, even when they include line management.
    - Wet-lab, clinical, biomedical, conservation, market, user, policy, nutrition, and other non-computational research/scientist roles.
    - Generic IT helpdesk, desktop support, service desk, EUC, onsite field support, and managed-services ticket work unless engineering/automation is explicit.
    - Non-engineering roles: sales, business development, marketing, HR, finance, legal, operations, recruiting, customer success, account management, and business analysis. Pure project/program/product/delivery/scrum roles are excluded when they lack software engineering delivery context, but can be relevant when they own software/IT engineering delivery.

